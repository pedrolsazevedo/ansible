---
- name: Test playbook syntax
  hosts: test_hosts
  gather_facts: true
  become: true

  vars:
    linux_user: testuser
    homebrew_prefix: /home/linuxbrew/.linuxbrew

  pre_tasks:
    - name: Create test user
      ansible.builtin.user:
        name: "{{ linux_user }}"
        state: present
        create_home: true
        shell: /bin/bash

  roles:
    - role: system_prep
      tags: [system]

    - role: development_tools
      tags: [dev_tools]

    - role: docker
      tags: [docker]

    - role: package_managers
      tags: [package_managers]

    - role: mise
      tags: [mise]

    - role: azure
      tags: [azure]

    - role: containers
      tags: [containers]

    - role: rancher_desktop
      tags: [rancher]

    - role: ssh_keys
      tags: [ssh]
