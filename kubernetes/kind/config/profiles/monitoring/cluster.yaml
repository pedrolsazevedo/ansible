kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: default-monitoring
nodes:
  - role: control-plane
    image: kindest/node:v1.34.3
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
    extraMounts:
      - hostPath: /data
        containerPath: /mnt/data
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
  - role: worker
    image: kindest/node:v1.34.3
    extraMounts:
      - hostPath: /data
        containerPath: /mnt/data
  - role: worker
    image: kindest/node:v1.34.3
    extraMounts:
      - hostPath: /data
        containerPath: /mnt/data
