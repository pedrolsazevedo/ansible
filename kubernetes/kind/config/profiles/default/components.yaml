# Hostnames to add to /etc/hosts (all point to 127.0.0.1)
hosts:
  # - grafana.local
  # - prometheus.local
  - ingress.local

components:
  ingress:
    enabled: true
    repo:
      name: ingress-nginx
      url: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    version: "4.14.2"
    release_name: ingress-nginx
    namespace: ingress-nginx
    values_file: config/values/ingress-nginx.yaml

  prometheus:
    enabled: false
    repo:
      name: prometheus-community
      url: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    version: "81.4.2"
    release_name: prometheus
    namespace: monitoring
    values_file: config/values/prometheus.yaml
    depends_on:
      - ingress
