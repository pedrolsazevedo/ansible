# Prometheus Stack Configuration
# Docs: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

prometheus:
  prometheusSpec:
    # Persistent storage for metrics
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: "10Gi"

grafana:
  # Enable persistent storage for dashboards and settings
  persistence:
    enabled: true
    size: "5Gi"
