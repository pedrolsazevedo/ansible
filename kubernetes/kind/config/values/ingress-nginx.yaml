# Ingress NGINX Controller Configuration
# Docs: https://kubernetes.github.io/ingress-nginx/

controller:
  # Enable hostPort to bind directly to node ports 80/443
  # Required for Kind clusters with extraPortMappings
  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443

  service:
    type: ClusterIP

  # Schedule on control-plane node (has port mappings in Kind)
  nodeSelector:
    ingress-ready: "true"

  # Allow scheduling on control-plane despite taint
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      effect: NoSchedule
