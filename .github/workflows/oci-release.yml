name: OCI Release

on:
  push:
    branches: [main]
    paths:
      - 'oci/**'
      - '.github/workflows/oci-release.yml'

env:
  DOCKER_USER: psazevedo

jobs:
  bump_version:
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    runs-on: ubuntu-latest
    environment: release
    name: "Bump version and create changelog with commitizen"
    defaults:
      run:
        working-directory: oci
    outputs:
      bump_version: ${{ steps.cz.outputs.version }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: "${{ secrets.GITHUB_TOKEN }}"
      - id: cz
        name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog_increment_filename: oci/CHANGELOG.md
      - name: Print Version
        run: echo "Bumped to version ${{ steps.cz.outputs.version }}"

  build_and_push:
    needs: bump_version
    runs-on: ubuntu-latest
    environment: release
    defaults:
      run:
        working-directory: oci
    strategy:
      matrix:
        image: [alpine, ubuntu, ubi, suse, node, oraclelinux, openssl]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }}
        run: make push IMAGE=${{ matrix.image }} VERSION=${{ needs.bump_version.outputs.bump_version }}
        env:
          DOCKER_USER: ${{ env.DOCKER_USER }}
