name: OCI PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'oci/**'
      - '.github/workflows/oci-pr.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oci
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run bake configuration tests
        run: bats tests/test_bake.bats

  test_build:
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oci
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test build all images (amd64 only)
        uses: docker/bake-action@v6
        with:
          workdir: oci
          targets: all
          set: |
            *.platform=linux/amd64
          load: true
