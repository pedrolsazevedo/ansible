---
- name: Download mise installer
  ansible.builtin.get_url:
    url: https://mise.run
    dest: /tmp/mise-install.sh
    mode: '0755'
  become: false

- name: Install mise
  ansible.builtin.command: /tmp/mise-install.sh
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/mise"
  become: false

- name: Create symlink to /usr/local/bin
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/.local/bin/mise"
    dest: "{{ mise_install_path }}"
    state: link
  when: mise_install_path != ansible_env.HOME + '/.local/bin/mise'

- name: Add mise to shell profiles
  become: false
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/{{ item }}"
    line: 'eval "$(~/.local/bin/mise activate bash)"'
    state: present
    create: true
    mode: '0644'
  loop:
    - .bashrc
    - .profile

- name: Install Node.js via mise
  become: false
  ansible.builtin.shell: |
    ~/.local/bin/mise use --global node@{{ item }}
  args:
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.local/share/mise/installs/node/{{ item }}"
  loop: "{{ node_versions }}"
